<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Increment Decrement Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Counter App</h1>
        <div id="count" class="count-display">0</div>
        <div class="button-group">
            <button onclick="decrement()" class="btn btn-dec">Decrement</button>
            <button onclick="increment()" class="btn btn-inc">Increment</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
